# ─────────────────────────────────────────────────────────────────────────────
# Observal CI — runs on every PR targeting main and on pushes to main.
#
# Recommended branch-protection rules (Settings → Branches → main):
#   Required status checks:
#     • lint
#     • test (3.11)
#     • test (3.12)
#     • test (3.13)
#     • web-lint
#     • docker-build
#     • security-scan
#   Require a pull request before merging
#   Require approvals: 1
#   Do not allow bypassing the above settings
# ─────────────────────────────────────────────────────────────────────────────

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# ── Job 1: Python lint ────────────────────────────────────────────────────────
jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install Python 3.13
        run: uv python install 3.13

      - name: ruff check
        run: uv run --with ruff==0.9.10 ruff check .

      - name: ruff format --check
        run: uv run --with ruff==0.9.10 ruff format --check .

# ── Job 2: Python tests (matrix) ─────────────────────────────────────────────
  test:
    name: test (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Run pytest
        run: |
          cd observal-server
          uv run \
            --python ${{ matrix.python-version }} \
            --with pytest \
            --with pytest-asyncio \
            --with pyyaml \
            --with typer \
            --with rich \
            pytest ../tests/ -q

# ── Job 3: Next.js lint + typecheck ──────────────────────────────────────────
  web-lint:
    name: web-lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: ESLint
        run: pnpm run lint

      - name: TypeScript typecheck
        run: pnpm run typecheck

# ── Job 4: Docker build ───────────────────────────────────────────────────────
  docker-build:
    name: docker-build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docker

    steps:
      - uses: actions/checkout@v4

      # docker-compose.yml references env_file: ../.env — create a stub so
      # the build doesn't fail on a missing file.
      - name: Create stub .env
        run: touch ../.env

      - name: Build images
        run: docker compose build

# ── Job 5: Python SAST with bandit ──────────────────────────────────────────
  security-scan:
    name: security-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - name: Install Python 3.12
        run: uv python install 3.12
      - name: Run bandit
        run: uv run --with bandit bandit -r observal-server/ observal_cli/ -c pyproject.toml -f json -o bandit-report.json || true
      - name: Check bandit results
        run: uv run --with bandit bandit -r observal-server/ observal_cli/ -c pyproject.toml -ll

# ── Job 6: Dependency audit ─────────────────────────────────────────────────
  dependency-audit:
    name: dependency-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python dependency audit
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - name: Run pip-audit
        # TODO: burn down pre-existing advisories then remove || true
        run: |
          uv python install 3.12
          cd observal-server
          uv run --with pip-audit pip-audit --strict --desc || true

      - name: JS dependency audit
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Run pnpm audit
        run: |
          cd web
          pnpm install --frozen-lockfile
          pnpm audit --prod || true
